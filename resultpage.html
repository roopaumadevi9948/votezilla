<!DOCTYPE html>
<html>
<head>
<title>Results</title>

<style>
body{
font-family:Arial;
background:#f0f0f0;
text-align:center;
}

.box{
background:white;
width:300px;
margin:100px auto;
padding:20px;
box-shadow:0 0 10px gray;
}
</style>

</head>
<body>

<div class="box">
<h2>Voting Results</h2>

<p>Party A Votes: <span id="a"></span></p>
<p>Party B Votes: <span id="b"></span></p>
<p>Party C Votes: <span id="c"></span></p>

<br>
<a href="vote1.html">Back to Vote</a>

</div>

<script>
document.getElementById("a").innerText = localStorage.getItem("Party A") || 0;
document.getElementById("b").innerText = localStorage.getItem("Party B") || 0;
document.getElementById("c").innerText = localStorage.getItem("Party C") || 0;
</script>

</body>
</html>
